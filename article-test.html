<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>文章测试</title>
</head>
<body>
  <h2>文章测试</h2>
  <div id="result">加载中...</div>

  <script>
    var SUPABASE_URL = 'https://fihyvfmqmknrkwgjbxxs.supabase.co';
    var SUPABASE_ANON_KEY = 'sb_publishable_DXbYKwzB6MLCAlQaKy26JQ_Y-H-MKFL';

    // 测试用：直接查 about-us 这篇文章
    var slug = 'about-us';

    fetch(SUPABASE_URL + '/rest/v1/articles?slug=eq.' + slug + '&select=title,content', {
      headers: {
        'apikey': SUPABASE_ANON_KEY,
        'Authorization': 'Bearer ' + SUPABASE_ANON_KEY
      }
    })
    .then(function(response) {
      if (!response.ok) {
        document.getElementById('result').textContent = '状态码: ' + response.status;
        return;
      }
      return response.json();
    })
    .then(function(data) {
      if (data && data.length > 0) {
        document.getElementById('result').innerHTML = 
          '<h3>' + data[0].title + '</h3><div>' + data[0].content + '</div>';
      } else {
        document.getElementById('result').textContent = '没有数据';
      }
    })
    .catch(function(err) {
      document.getElementById('result').textContent = '错误: ' + err.message;
    });
  </script>
</body>
</html>
