<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理后台</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; max-width: 1200px; margin: 30px auto; padding: 0 20px; background: #f5f7fa; }
    h1 { color: #1a1a2e; border-bottom: 3px solid #4a9eff; padding-bottom: 10px; }
    .tabs { display: flex; gap: 10px; margin: 20px 0; border-bottom: 2px solid #ddd; padding-bottom: 10px; }
    .tabs button { padding: 10px 25px; border: none; background: #e8ecf1; cursor: pointer; border-radius: 6px 6px 0 0; font-size: 15px; font-weight: 500; }
    .tabs button.active { background: #4a9eff; color: #fff; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .toolbar { margin: 15px 0; display: flex; gap: 10px; flex-wrap: wrap; }
    .toolbar input { padding: 8px 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; flex: 1; min-width: 150px; }
    .btn { padding: 8px 18px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; }
    .btn-primary { background: #4a9eff; color: #fff; }
    .btn-primary:hover { background: #3a7fd4; }
    .btn-danger { background: #ff6b6b; color: #fff; }
    .btn-danger:hover { background: #e05555; }
    .btn-success { background: #51cf66; color: #fff; }
    .btn-success:hover { background: #40b057; }
    .btn-warning { background: #fcc419; color: #333; }
    .btn-warning:hover { background: #e6b013; }
    .btn-secondary { background: #6c757d; color: #fff; }
    .btn-secondary:hover { background: #5a6268; }
    table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #eee; }
    th { background: #f0f4f8; font-weight: 600; }
    tr:hover { background: #f8fafc; }
    .code-badge { background: #f0f0f0; padding: 2px 10px; border-radius: 4px; font-family: monospace; font-size: 13px; }
    .status-badge { padding: 2px 12px; border-radius: 20px; font-size: 12px; font-weight: 500; }
    .status-active { background: #d3f9d8; color: #2b8a3e; }
    .status-inactive { background: #ffe3e3; color: #c92a2a; }
    .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; }
    .modal.active { display: flex; }
    .modal-content { background: #fff; padding: 30px; border-radius: 12px; max-width: 700px; width: 90%; max-height: 90vh; overflow-y: auto; }
    .modal-content h2 { margin-top: 0; }
    .modal-content label { display: block; margin: 15px 0 5px; font-weight: 500; }
    .modal-content input, .modal-content textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; }
    .modal-content textarea { min-height: 250px; font-family: monospace; }
    .modal-actions { margin-top: 20px; display: flex; gap: 10px; justify-content: flex-end; }
    .empty { color: #999; text-align: center; padding: 40px 0; }
    .slug-preview { color: #666; font-size: 13px; margin-top: 4px; }
    .login-notice { background: #fff3cd; border: 1px solid #ffc107; padding: 12px 20px; border-radius: 6px; margin-bottom: 20px; }
    .warning-banner { background: #f8d7da; border: 1px solid #f5c6cb; padding: 12px 20px; border-radius: 6px; margin-bottom: 20px; color: #721c24; }
    .login-grid { display: flex; flex-direction: column; gap: 8px; max-width: 400px; margin-top: 10px; }
    .login-grid input { padding: 10px 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; width: 100%; }
    .login-grid .key-input { font-family: monospace; }
    .login-grid .btn { width: 100%; padding: 10px; font-size: 15px; }
    .login-hint { font-size: 13px; color: #856404; margin-top: 4px; }
    .top-actions { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 15px; }
    .file-input-hidden { display: none; }
    .backup-badge { font-size: 12px; color: #666; margin-left: 10px; }
    .lock-notice { background: #f8d7da; border: 1px solid #f5c6cb; padding: 12px 20px; border-radius: 6px; margin-bottom: 20px; color: #721c24; }
  </style>
</head>
<body>

<h1>🔐 管理后台</h1>

<!-- ===== 密钥登录区 ===== -->
<div id="adminLoginArea" class="login-notice">
  <strong>⚠️ 请输入操作密钥</strong>
  <div class="login-grid">
    <input id="serviceRoleKey" type="password" class="key-input" placeholder="操作密钥（service_role）">
    <button class="btn btn-primary" onclick="adminLogin()">登录管理</button>
    <span id="adminLoginMsg" style="color:red;font-size:14px;"></span>
    <div class="login-hint">
      💡 操作密钥在 Supabase 后台 → Settings → API → service_role 中获取
    </div>
  </div>
</div>

<!-- ===== 锁定提示区 ===== -->
<div id="lockNotice" class="lock-notice" style="display:none;">
  ⛔ 登录失败次数过多，已锁定 <span id="lockRemainMin">15</span> 分钟。<br>
  请在 <span id="lockRemainSec">900</span> 秒后重试。
</div>

<!-- ===== 管理内容区 ===== -->
<div id="adminContent" style="display:none;">
  <div class="warning-banner">
    ✅ 安全模式已启用：操作密钥仅在本地 session 中存储
  </div>

  <div class="top-actions">
    <button class="btn btn-success" onclick="exportData()">📥 导出数据</button>
    <button class="btn btn-warning" onclick="document.getElementById('importFileInput').click()">📤 导入数据</button>
    <input type="file" id="importFileInput" class="file-input-hidden" accept=".json" onchange="importData(event)">
    <span id="backupStatus" class="backup-badge"></span>
  </div>

  <div class="tabs">
    <button class="active" onclick="switchTab('codes')">🔑 使用码管理</button>
    <button onclick="switchTab('articles')">📄 文章管理</button>
  </div>

  <div id="tab-codes" class="tab-content active">
    <div class="toolbar">
      <input id="newCode" placeholder="18位使用码" maxlength="18">
      <input id="newRemark" placeholder="备注">
      <button class="btn btn-success" onclick="addCode()">+ 添加</button>
    </div>
    <table><thead><tr><th>ID</th><th>使用码</th><th>备注</th><th>状态</th><th>操作</th></tr></thead><tbody id="codeList"></tbody></table>
  </div>

  <div id="tab-articles" class="tab-content">
    <div style="margin-bottom:15px;"><button class="btn btn-primary" onclick="openArticleModal()">+ 写新文章</button></div>
    <table><thead><tr><th>ID</th><th>别名</th><th>标题</th><th>创建时间</th><th>操作</th></tr></thead><tbody id="articleList"></tbody></table>
  </div>
</div>

<!-- ===== 文章编辑弹窗 ===== -->
<div id="articleModal" class="modal">
  <div class="modal-content">
    <h2 id="articleModalTitle">写新文章</h2>
    <input type="hidden" id="editArticleId">
    <label>文章别名 (slug) <span style="color:#999;font-weight:400;">— 用于URL</span></label>
    <input id="editSlug" placeholder="例如：about-us">
    <div class="slug-preview">🔗 访问地址：/article.html?slug=<span id="slugPreview">...</span></div>
    <label>文章标题</label><input id="editTitle" placeholder="输入标题">
    <label>正文 (支持HTML)</label><textarea id="editContent" placeholder="写文章内容，支持 HTML 标签..."></textarea>
    <div style="font-size:12px;color:#999;margin-top:4px;">💡 支持 &lt;h1&gt;、&lt;p&gt;、&lt;img&gt;、&lt;ul&gt;、&lt;iframe&gt; 等所有HTML标签</div>
    <div class="modal-actions"><button class="btn btn-warning" onclick="closeArticleModal()">取消</button><button class="btn btn-primary" onclick="saveArticle()">💾 保存</button></div>
  </div>
</div>

<script>
// ============================================================
// 配置区 - 请修改成你自己的信息
// ============================================================
var SUPABASE_URL = 'https://fihyvfmqmknrkwgjbxxs.supabase.co';
var SUPABASE_ANON_KEY = '你的anon密钥';
var MAX_LOGIN_ATTEMPTS = 3;
var LOCK_DURATION_MINUTES = 15;
// ============================================================

// ===== 登录锁定管理 =====
function getLoginAttempts() {
    var attempts = localStorage.getItem('login_attempts');
    return attempts ? parseInt(attempts) : 0;
}

function setLoginAttempts(count) {
    localStorage.setItem('login_attempts', String(count));
}

function getLockUntil() {
    var lockUntil = localStorage.getItem('lock_until');
    return lockUntil ? parseInt(lockUntil) : 0;
}

function setLockUntil(timestamp) {
    localStorage.setItem('lock_until', String(timestamp));
}

function isLocked() {
    var lockUntil = getLockUntil();
    var now = Date.now();
    if (lockUntil > 0 && now < lockUntil) {
        return true;
    } else if (lockUntil > 0 && now >= lockUntil) {
        setLockUntil(0);
        setLoginAttempts(0);
        return false;
    }
    return false;
}

function getRemainingLockTime() {
    var lockUntil = getLockUntil();
    var now = Date.now();
    if (lockUntil > now) {
        return Math.floor((lockUntil - now) / 1000);
    }
    return 0;
}

function triggerLock() {
    var lockUntil = Date.now() + LOCK_DURATION_MINUTES * 60 * 1000;
    setLockUntil(lockUntil);
    setLoginAttempts(0);
    updateLockUI();
}

function resetLoginAttempts() {
    setLoginAttempts(0);
    setLockUntil(0);
}

function updateLockUI() {
    var lockNotice = document.getElementById('lockNotice');
    var loginArea = document.getElementById('adminLoginArea');
    var msg = document.getElementById('adminLoginMsg');

    if (isLocked()) {
        lockNotice.style.display = 'block';
        loginArea.style.display = 'none';
        var remaining = getRemainingLockTime();
        document.getElementById('lockRemainMin').textContent = Math.floor(remaining / 60);
        document.getElementById('lockRemainSec').textContent = remaining;
        if (window._lockInterval) clearInterval(window._lockInterval);
        window._lockInterval = setInterval(function() {
            var r = getRemainingLockTime();
            if (r <= 0) {
                clearInterval(window._lockInterval);
                lockNotice.style.display = 'none';
                loginArea.style.display = 'block';
                msg.textContent = '锁定已解除，请重新登录';
                setLockUntil(0);
                setLoginAttempts(0);
                return;
            }
            document.getElementById('lockRemainMin').textContent = Math.floor(r / 60);
            document.getElementById('lockRemainSec').textContent = r;
        }, 1000);
    } else {
        lockNotice.style.display = 'none';
        loginArea.style.display = 'block';
        if (window._lockInterval) {
            clearInterval(window._lockInterval);
            window._lockInterval = null;
        }
    }
}

// ===== 管理员登录 =====
function adminLogin() {
    var serviceKey = document.getElementById('serviceRoleKey').value.trim();
    var msg = document.getElementById('adminLoginMsg');

    if (isLocked()) {
        msg.textContent = '⛔ 账号已锁定，请等待 ' + LOCK_DURATION_MINUTES + ' 分钟';
        updateLockUI();
        return;
    }

    if (!serviceKey) {
        msg.textContent = '请输入操作密钥';
        return;
    }

    msg.textContent = '验证中...';

    var url = SUPABASE_URL + '/rest/v1/admin_users?username=eq.admin&select=username';
    fetch(url, {
        headers: {
            'apikey': serviceKey,
            'Authorization': 'Bearer ' + serviceKey
        }
    })
    .then(function(response) {
        if (!response.ok) {
            if (response.status === 401 || response.status === 403) {
                var attempts = getLoginAttempts() + 1;
                setLoginAttempts(attempts);
                var remaining = MAX_LOGIN_ATTEMPTS - attempts;
                if (remaining <= 0) {
                    triggerLock();
                    msg.textContent = '⛔ 登录失败 ' + MAX_LOGIN_ATTEMPTS + ' 次，已锁定 ' + LOCK_DURATION_MINUTES + ' 分钟';
                    updateLockUI();
                } else {
                    msg.textContent = '❌ 密钥错误，还剩 ' + remaining + ' 次尝试机会';
                }
                throw new Error('密钥无效');
            }
            throw new Error('请求失败，状态码: ' + response.status);
        }
        return response.json();
    })
    .then(function(data) {
        if (data && data.length > 0) {
            resetLoginAttempts();
            sessionStorage.setItem('admin_logged_in', 'true');
            sessionStorage.setItem('service_role_key', serviceKey);
            document.getElementById('adminLoginArea').style.display = 'none';
            document.getElementById('adminContent').style.display = 'block';
            loadCodes();
            loadArticles();
            msg.textContent = '';
            document.getElementById('serviceRoleKey').value = '';
        } else {
            msg.textContent = '❌ 管理员账号不存在';
        }
    })
    .catch(function(err) {
        console.error('登录错误:', err);
    });
}

document.getElementById('serviceRoleKey').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') adminLogin();
});

// ===== 页面加载检查 =====
if (sessionStorage.getItem('admin_logged_in') === 'true') {
    document.getElementById('adminLoginArea').style.display = 'none';
    document.getElementById('adminContent').style.display = 'block';
    loadCodes();
    loadArticles();
} else {
    updateLockUI();
}

// ===== 标签切换 =====
function switchTab(tab) {
    var tabs = document.querySelectorAll('.tab-content');
    for (var i = 0; i < tabs.length; i++) {
        tabs[i].classList.remove('active');
    }
    var btns = document.querySelectorAll('.tabs button');
    for (var i = 0; i < btns.length; i++) {
        btns[i].classList.remove('active');
    }
    document.getElementById('tab-' + tab).classList.add('active');
    event.target.classList.add('active');
    if (tab === 'articles') loadArticles();
    if (tab === 'codes') loadCodes();
}

// ===== 通用请求 =====
function supabaseFetch(endpoint, options) {
    options = options || {};
    var url = SUPABASE_URL + '/rest/v1/' + endpoint;
    var headers = {
        'apikey': SUPABASE_ANON_KEY,
        'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
        'Content-Type': 'application/json',
        'Prefer': 'return=representation'
    };
    if (options.headers) {
        for (var key in options.headers) {
            headers[key] = options.headers[key];
        }
    }
    return fetch(url, {
        method: options.method || 'GET',
        headers: headers,
        body: options.body || undefined
    });
}

function getServiceRoleKey() {
    var key = sessionStorage.getItem('service_role_key');
    if (!key) {
        alert('操作密钥已过期，请重新登录');
        window.location.reload();
        throw new Error('操作密钥未找到');
    }
    return key;
}

function supabaseAdminWrite(endpoint, options) {
    options = options || {};
    var url = SUPABASE_URL + '/rest/v1/' + endpoint;
    var serviceKey = getServiceRoleKey();
    var headers = {
        'apikey': serviceKey,
        'Authorization': 'Bearer ' + serviceKey,
        'Content-Type': 'application/json',
        'Prefer': 'return=representation'
    };
    if (options.headers) {
        for (var key in options.headers) {
            headers[key] = options.headers[key];
        }
    }
    return fetch(url, {
        method: options.method || 'GET',
        headers: headers,
        body: options.body || undefined
    });
}

// ============================================================
// 📥 导出数据
// ============================================================
function exportData() {
    var status = document.getElementById('backupStatus');
    status.textContent = '⏳ 导出中...';

    Promise.all([
        supabaseFetch('access_codes?select=*&order=id.asc').then(r => r.json()),
        supabaseFetch('articles?select=*&order=id.asc').then(r => r.json())
    ])
    .then(function(results) {
        var data = {
            version: '1.0',
            exported_at: new Date().toISOString(),
            access_codes: results[0] || [],
            articles: results[1] || []
        };
        var blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url;
        a.download = 'backup_' + new Date().toISOString().slice(0,10) + '.json';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        status.textContent = '✅ 导出成功！(' + new Date().toLocaleTimeString() + ')';
        setTimeout(function() { status.textContent = ''; }, 5000);
    })
    .catch(function(err) {
        console.error('导出失败:', err);
        status.textContent = '❌ 导出失败: ' + err.message;
    });
}

// ============================================================
// 📤 导入数据
// ============================================================
function importData(event) {
    var file = event.target.files[0];
    var status = document.getElementById('backupStatus');

    if (!file) return;

    var reader = new FileReader();
    reader.onload = function(e) {
        try {
            var data = JSON.parse(e.target.result);
            if (!data.access_codes || !data.articles) {
                status.textContent = '❌ 无效的备份文件';
                return;
            }
            if (!confirm('⚠️ 导入将覆盖当前所有数据，确定继续吗？')) {
                status.textContent = '已取消';
                return;
            }
            performImport(data);
        } catch (err) {
            status.textContent = '❌ 文件解析失败: ' + err.message;
        }
    };
    reader.readAsText(file);
    event.target.value = '';
}

function performImport(data) {
    var status = document.getElementById('backupStatus');
    status.textContent = '⏳ 导入中...';

    var serviceKey = getServiceRoleKey();

    Promise.all([
        fetch(SUPABASE_URL + '/rest/v1/access_codes?select=id', {
            headers: {
                'apikey': serviceKey,
                'Authorization': 'Bearer ' + serviceKey
            }
        })
        .then(r => r.json())
        .then(function(rows) {
            if (rows && rows.length > 0) {
                var ids = rows.map(r => r.id);
                return fetch(SUPABASE_URL + '/rest/v1/access_codes?id=in.(' + ids.join(',') + ')', {
                    method: 'DELETE',
                    headers: {
                        'apikey': serviceKey,
                        'Authorization': 'Bearer ' + serviceKey
                    }
                });
            }
        }),
        fetch(SUPABASE_URL + '/rest/v1/articles?select=id', {
            headers: {
                'apikey': serviceKey,
                'Authorization': 'Bearer ' + serviceKey
            }
        })
        .then(r => r.json())
        .then(function(rows) {
            if (rows && rows.length > 0) {
                var ids = rows.map(r => r.id);
                return fetch(SUPABASE_URL + '/rest/v1/articles?id=in.(' + ids.join(',') + ')', {
                    method: 'DELETE',
                    headers: {
                        'apikey': serviceKey,
                        'Authorization': 'Bearer ' + serviceKey
                    }
                });
            }
        })
    ])
    .then(function() {
        return importBatch('access_codes', data.access_codes, serviceKey);
    })
    .then(function() {
        return importBatch('articles', data.articles, serviceKey);
    })
    .then(function() {
        status.textContent = '✅ 导入成功！(' + new Date().toLocaleTimeString() + ')';
        loadCodes();
        loadArticles();
        setTimeout(function() { status.textContent = ''; }, 5000);
    })
    .catch(function(err) {
        console.error('导入失败:', err);
        status.textContent = '❌ 导入失败: ' + err.message;
    });
}

function importBatch(table, items, serviceKey) {
    if (!items || items.length === 0) return Promise.resolve();

    var cleanItems = items.map(function(item) {
        var copy = {};
        for (var key in item) {
            if (key !== 'id') {
                copy[key] = item[key];
            }
        }
        return copy;
    });

    var batchSize = 20;
    var batches = [];
    for (var i = 0; i < cleanItems.length; i += batchSize) {
        batches.push(cleanItems.slice(i, i + batchSize));
    }

    return batches.reduce(function(prev, batch) {
        return prev.then(function() {
            return fetch(SUPABASE_URL + '/rest/v1/' + table, {
                method: 'POST',
                headers: {
                    'apikey': serviceKey,
                    'Authorization': 'Bearer ' + serviceKey,
                    'Content-Type': 'application/json',
                    'Prefer': 'return=minimal'
                },
                body: JSON.stringify(batch)
            });
        });
    }, Promise.resolve());
}

// ========== 使用码 ==========
function loadCodes() {
    supabaseFetch('access_codes?select=*&order=id.asc')
    .then(function(res) {
        if (!res.ok) throw new Error('加载失败');
        return res.json();
    })
    .then(function(data) {
        var tbody = document.getElementById('codeList');
        if (!data || data.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" class="empty">暂无使用码</td></tr>';
            return;
        }
        var html = '';
        for (var i = 0; i < data.length; i++) {
            var item = data[i];
            var statusClass = item.is_active ? 'status-active' : 'status-inactive';
            var statusText = item.is_active ? '✅ 有效' : '⛔ 停用';
            var btnClass = item.is_active ? 'btn-warning' : 'btn-success';
            var btnText = item.is_active ? '停用' : '启用';
            html += '<tr>' +
                '<td>' + item.id + '</td>' +
                '<td><span class="code-badge">' + item.code + '</span></td>' +
                '<td>' + (item.remark || '-') + '</td>' +
                '<td><span class="status-badge ' + statusClass + '">' + statusText + '</span></td>' +
                '<td>' +
                '<button class="btn ' + btnClass + '" onclick="toggleCode(' + item.id + ', ' + (!item.is_active) + ')" style="padding:4px 12px;font-size:12px;">' + btnText + '</button> ' +
                '<button class="btn btn-danger" onclick="deleteCode(' + item.id + ')" style="padding:4px 12px;font-size:12px;">删除</button>' +
                '</td>' +
                '</tr>';
        }
        tbody.innerHTML = html;
    })
    .catch(function(err) {
        document.getElementById('codeList').innerHTML = '<tr><td colspan="5" class="empty">加载失败</td></tr>';
    });
}

function addCode() {
    var code = document.getElementById('newCode').value.trim();
    var remark = document.getElementById('newRemark').value.trim();
    if (code.length !== 18) { alert('请输入18位使用码'); return; }
    supabaseAdminWrite('access_codes', {
        method: 'POST',
        body: JSON.stringify({ code: code, remark: remark, is_active: true })
    })
    .then(function() {
        document.getElementById('newCode').value = '';
        document.getElementById('newRemark').value = '';
        loadCodes();
    })
    .catch(function() { alert('添加失败'); });
}

function toggleCode(id, newStatus) {
    supabaseAdminWrite('access_codes?id=eq.' + id, {
        method: 'PATCH',
        body: JSON.stringify({ is_active: newStatus })
    })
    .then(function() { loadCodes(); })
    .catch(function() { alert('操作失败'); });
}

function deleteCode(id) {
    if (!confirm('确定删除吗？')) return;
    supabaseAdminWrite('access_codes?id=eq.' + id, { method: 'DELETE' })
    .then(function() { loadCodes(); })
    .catch(function() { alert('删除失败'); });
}

// ========== 文章 ==========
function loadArticles() {
    supabaseFetch('articles?select=*&order=id.desc')
    .then(function(res) {
        if (!res.ok) throw new Error('加载失败');
        return res.json();
    })
    .then(function(data) {
        var tbody = document.getElementById('articleList');
        if (!data || data.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" class="empty">还没有文章</td></tr>';
            return;
        }
        var html = '';
        for (var i = 0; i < data.length; i++) {
            var item = data[i];
            var date = new Date(item.created_at).toLocaleString();
            html += '<tr>' +
                '<td>' + item.id + '</td>' +
                '<td><code>' + item.slug + '</code></td>' +
                '<td>' + item.title + '</td>' +
                '<td>' + date + '</td>' +
                '<td>' +
                '<button class="btn btn-primary" onclick="editArticle(' + item.id + ')" style="padding:4px 12px;font-size:12px;">✏️ 编辑</button> ' +
                '<button class="btn btn-danger" onclick="deleteArticle(' + item.id + ')" style="padding:4px 12px;font-size:12px;">🗑️ 删除</button>' +
                '</td>' +
                '</tr>';
        }
        tbody.innerHTML = html;
    })
    .catch(function(err) {
        document.getElementById('articleList').innerHTML = '<tr><td colspan="5" class="empty">加载失败</td></tr>';
    });
}

function openArticleModal(data) {
    var modal = document.getElementById('articleModal');
    if (data) {
        document.getElementById('articleModalTitle').textContent = '✏️ 编辑文章';
        document.getElementById('editArticleId').value = data.id;
        document.getElementById('editSlug').value = data.slug;
        document.getElementById('editTitle').value = data.title;
        document.getElementById('editContent').value = data.content;
        document.getElementById('slugPreview').textContent = data.slug;
    } else {
        document.getElementById('articleModalTitle').textContent = '✏️ 写新文章';
        document.getElementById('editArticleId').value = '';
        document.getElementById('editSlug').value = '';
        document.getElementById('editTitle').value = '';
        document.getElementById('editContent').value = '';
        document.getElementById('slugPreview').textContent = '...';
    }
    modal.classList.add('active');
}

function closeArticleModal() {
    document.getElementById('articleModal').classList.remove('active');
}

document.getElementById('editSlug').addEventListener('input', function() {
    document.getElementById('slugPreview').textContent = this.value || '...';
});

function saveArticle() {
    var id = document.getElementById('editArticleId').value;
    var slug = document.getElementById('editSlug').value.trim();
    var title = document.getElementById('editTitle').value.trim();
    var content = document.getElementById('editContent').value.trim();
    if (!slug || !title || !content) { alert('请填写完整信息'); return; }
    if (!/^[a-zA-Z0-9\-]+$/.test(slug)) { alert('别名只能包含字母、数字和短横线(-)'); return; }

    var url = 'articles';
    var method = 'POST';
    var body = { slug: slug, title: title, content: content };
    if (id) {
        url = 'articles?id=eq.' + id;
        method = 'PATCH';
    }
    supabaseAdminWrite(url, {
        method: method,
        body: JSON.stringify(body)
    })
    .then(function(res) {
        if (!res.ok) { alert('保存失败'); return; }
        closeArticleModal();
        loadArticles();
    })
    .catch(function() { alert('保存失败'); });
}

function editArticle(id) {
    supabaseFetch('articles?id=eq.' + id)
    .then(function(res) { return res.json(); })
    .then(function(data) {
        if (data && data.length > 0) openArticleModal(data[0]);
    })
    .catch(function() { alert('加载文章失败'); });
}

function deleteArticle(id) {
    if (!confirm('确定删除吗？')) return;
    supabaseAdminWrite('articles?id=eq.' + id, { method: 'DELETE' })
    .then(function() { loadArticles(); })
    .catch(function() { alert('删除失败'); });
}

document.getElementById('articleModal').addEventListener('click', function(e) {
    if (e.target === this) closeArticleModal();
});
</script>
